Number 1: <input id="num1" placeholder="Enter Number 1"><br>
Number 2: <input id="num2" placeholder="Enter Number 2"><br>

<button onclick="add()">Add</button>

<input id="result" placeholder="Total">

<script>
    var box1 = document.getElementById("num1")
    var box2 = document.getElementById("num2")
    var result = document.getElementById("result")



    function add() {
        var box1value = Number(box1.value)
        var box2value = Number(box2.value)

        var total = box1value + box2value
        result.value = total
    }
</script>
